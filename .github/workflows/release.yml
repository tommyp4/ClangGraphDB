name: Release GraphDB Binaries

on:
  push:
    tags:
      - 'v*' # Trigger on any tag matching v*, e.g., v1.0.0, v2.1.3-beta
  workflow_dispatch: # Allow manual triggering from the GitHub UI

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a GitHub Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: .gemini/tools/zig-linux-x86_64-0.13.0
          key: ${{ runner.os }}-zig-0.13.0

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          mkdir -p .gemini/tools
          cd .gemini/tools
          curl -L -O https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz

      - name: Build Binaries
        run: make build-all

      - name: Package Bundle
        run: |
          echo "*" > .gemini/skills/graphdb/.gitignore
          echo "*" > .gemini/skills/neo4j-manager/.gitignore
          mkdir -p .gemini/graph_data
          echo "*" > .gemini/graph_data/.gitignore

          tar -czvf graphdb-skill-bundle.tar.gz \
            --exclude=".gemini/tools" \
            --exclude=".gemini/skills/release-manager" \
            .gemini/agents \
            .gemini/skills \
            .gemini/graph_data

      - name: Upload Artifacts (For Manual Runs)
        uses: actions/upload-artifact@v4
        with:
          name: graphdb-binaries
          path: |
            .gemini/skills/graphdb/scripts/graphdb
            .gemini/skills/graphdb/scripts/graphdb-win.exe
            graphdb-skill-bundle.tar.gz
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            .gemini/skills/graphdb/scripts/graphdb
            .gemini/skills/graphdb/scripts/graphdb-win.exe
            graphdb-skill-bundle.tar.gz
          generate_release_notes: true
