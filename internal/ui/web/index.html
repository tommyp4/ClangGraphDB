<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GraphDB D3 Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        #search-container {
            margin-bottom: 20px;
        }
        #search-input {
            padding: 8px;
            width: 300px;
            font-size: 16px;
        }
        #search-button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }
        #main-layout {
            display: flex;
            gap: 20px;
        }
        #graph-container {
            flex: 2;
            height: 800px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        #impact-panel {
            flex: 1;
            height: 800px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow-y: auto;
            padding: 10px;
            display: none;
        }
        .node {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 1.5px;
        }
        .node.pinch-point {
            stroke: #ffcc00;
            stroke-width: 4px;
        }
        .node.semantic-seam {
            stroke: #ff3366;
            stroke-width: 4px;
            stroke-dasharray: 4;
        }
        .node-label {
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 1px 0 #fff, 1px 0 0 #fff, 0 -1px 0 #fff, -1px 0 0 #fff;
        }
        #context-menu {
            display: none;
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        #context-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #context-menu ul li {
            padding: 8px 12px;
            cursor: pointer;
        }
        #context-menu ul li:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>GraphDB Visualizer</h1>
    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search for features or functions...">
        <button id="search-button">Search</button>
        <button id="pinch-points-button">Show Pinch Points</button>
        <button id="semantic-seams-button">Show Semantic Disconnects</button>
    </div>
    
    <div id="main-layout">
        <div id="graph-container"></div>
        <div id="impact-panel">
            <h2>Extraction Impact</h2>
            <div id="impact-content"></div>
        </div>
    </div>

    <div id="context-menu">
        <ul>
            <li id="menu-simulate-extraction">Simulate Extraction</li>
        </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
